  #       # Optimize: both
  #       - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/meta-llama/llama-3.3-70b-instruct --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type adversarial --optimize both --eta <%= @settings["eta"] || "0.5" %> --gamma 0.1 --importance-weighted-reward --max-turns 30 --push-to-db


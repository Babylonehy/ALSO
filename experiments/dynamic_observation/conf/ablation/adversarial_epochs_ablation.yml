# Ablation Study: Different NN Training Epochs for Adversarial Bandit
#
# Epochs controls how well the neural network is trained:
#   - More epochs = better NN predictions, but slower
#   - Fewer epochs = faster, but NN may underfit
#
# Testing: epochs = 5, 10, 20, 30, 40, 50, 100, 500, 1000
#
# Usage:
#   tmuxinator start -p conf/ablation/adversarial_epochs_ablation.yml gpu=0
#   tmuxinator start -p conf/ablation/adversarial_epochs_ablation.yml gpu=0 batch=30

name: ablation-adversarial-epochs-batch<%= (@settings["batch"] || "30").to_s %>
root: .
startup_window: epochs_5

pre_window:
  - cd <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation
  - source <%= @settings["project_root"] || "/path/to/project" %>/.venv/bin/activate
  - unset ALL_PROXY all_proxy
  - export CUDA_VISIBLE_DEVICES=<%= @settings["gpu"] || "0" %>

windows:
  # Epochs = 5 (very fast, likely underfit)
  - epochs_5:
      layout: tiled
      panes:
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard_small --model "custom/qwen/qwen-2.5-72b-instruct@http://YOUR_MODEL_ENDPOINT/v1" --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type adversarial --optimize both --eta 10.0 --epochs 5 --max-turns 20 --push-to-db --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim --tag-suffix ablation_epochs_5

  # Epochs = 10

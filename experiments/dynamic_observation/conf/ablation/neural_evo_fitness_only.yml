# Ablation Study: Neural Evolution with FITNESS-ONLY Selection
# 
# This ablation tests the impact of using raw fitness scores instead of NN cumulative scores.
# Instead of training a neural network to predict arm values, we directly use the 
# population fitness scores with EXP3-style softmax selection.
#
# Comparison:
#   - Full model: --evo-selection-mode nn_cumulative (NN predicts arm values)
#   - This ablation: --evo-selection-mode fitness (direct fitness scores + EXP3)
#
# Usage:
#   tmuxinator start -p conf/ablation/neural_evo_fitness_only.yml gpu=0
#   tmuxinator start -p conf/ablation/neural_evo_fitness_only.yml project_root=/path/to/project gpu=0

name: ablation-neural-evo-fitness-only-<%= (@settings["batch"] || "40").to_s %>
root: .
startup_window: main

pre_window:
  - cd <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation
  - source <%= @settings["project_root"] || "/path/to/project" %>/.venv/bin/activate
  - unset ALL_PROXY all_proxy
  - export CUDA_VISIBLE_DEVICES=<%= @settings["gpu"] || "0" %>

windows:
  - main:
      layout: tiled
      panes:
        # Optimize: p1 (fitness-based selection)
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --population-size 13 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "40" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neural_evolution --evo-selection-mode fitness --optimize p1 --eta <%= @settings["eta"] || "10" %> --max-turns 20 --push-to-db --evolution-interval 5 --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim
        # Optimize: p2 (fitness-based selection)
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --population-size 13 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "40" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neural_evolution --evo-selection-mode fitness --optimize p2 --eta <%= @settings["eta"] || "10" %> --max-turns 20 --push-to-db --evolution-interval 5 --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim
        # Optimize: both (fitness-based selection)
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --population-size 13 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "40" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neural_evolution --evo-selection-mode fitness --optimize both --eta <%= @settings["eta"] || "10" %> --max-turns 20 --push-to-db --evolution-interval 5 --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim


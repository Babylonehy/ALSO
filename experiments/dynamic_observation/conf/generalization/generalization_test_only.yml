# Cross-Scenario Generalization Experiment - Test Only (Use Pretrained Model)
#
# This experiment evaluates cross-scenario generalization:
# - Loads pretrained model (frozen)
# - Test on 2 combos (using single-env-split logic from previous fast setup)
#
# Usage:
#   tmuxinator start -p conf/generalization/generalization_test_only.yml
#

name: gen-adv-test-only
root: .
startup_window: main

pre_window:
  - cd <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation
  - source <%= @settings["project_root"] || "/path/to/project" %>/.venv/bin/activate
  - unset ALL_PROXY all_proxy

<%- model = @settings["model"] || "openrouter/qwen/qwen-2.5-72b-instruct" -%>
<%- reward_model = @settings["reward_model"] || "openrouter/deepseek/deepseek-v3.2" -%>
<%- eta = @settings["eta"] || "10.0" -%>
<%- max_turns = @settings["max_turns"] || "5" -%>
<%- model_dir = "results/generalization/adversarial_splitA_20260127_184542_fast_ctx/train" -%>
<%- suffix = "test_only_fast" -%>
<%- push_db_flag = "--push-to-db" -%>
<%- context_flag = "--context-embedding --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --single-env-split" -%>

windows:
  - main:
      layout: tiled
      panes:
        # Test Only Pane: loads model from model_dir and runs test set
        - test: uv run python run_generalization_experiment.py --phase test --split A --model "<%= model %>" --reward-eval-model "<%= reward_model %>" --bandit-type adversarial --eta <%= eta %> --max-turns <%= max_turns %> --output-dir results/generalization --strategy-cache-dir cache/strategy_embeddings_v3_slim --model-dir "<%= model_dir %>" <%= push_db_flag %> --suffix <%= suffix %> <%= context_flag %> --concurrency 1

# Baseline configuration for agent1/agent2 model combinations
# Models: qwen-2.5-72b-instruct, openrouter/openai/gpt-4o, deepseek-v3.2
# All 9 permutations (3x3)
#
# Usage: tmuxinator start -p conf/baseline.yml gpu=0
#        tmuxinator start -p conf/baseline.yml gpu=4 batch=50
#        tmuxinator start -p conf/baseline.yml gpu=0 emd_dir=embeddings_backgrounds_strategic-8b/hard

name: baseline-batch<%= (@settings["batch"] || "30").to_s %>-<%= @settings["prefix"] || "" %>
root: .
startup_window: qwen_qwen

pre_window:
  - cd <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation
  - source <%= @settings["project_root"] || "/path/to/project" %>/.venv/bin/activate
  - unset ALL_PROXY all_proxy
  - export CUDA_VISIBLE_DEVICES=<%= @settings["gpu"] || "0" %>

windows:
  # ========== Agent1: qwen-2.5-72b-instruct ==========
  - qwen_qwen:
      layout: tiled
      panes:
        # agent1: qwen-2.5-72b-instruct, agent2: qwen-2.5-72b-instruct
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores  --subset hard --p1-model openrouter/qwen/qwen-2.5-72b-instruct --p2-model openrouter/qwen/qwen-2.5-72b-instruct --bandit-type adversarial --optimize none --max-turns 20 --push-to-db

  - qwen_gpt:
      layout: tiled
      panes:
        # agent1: qwen-2.5-72b-instruct, agent2: openrouter/openai/gpt-4o
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores  --subset hard --p1-model openrouter/qwen/qwen-2.5-72b-instruct --p2-model openrouter/openai/gpt-4o --bandit-type adversarial --optimize none --max-turns 20 --push-to-db

  - qwen_deepseek:
      layout: tiled
      panes:
        # agent1: qwen-2.5-72b-instruct, agent2: deepseek-v3.2
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores  --subset hard --p1-model openrouter/qwen/qwen-2.5-72b-instruct --p2-model openrouter/deepseek/deepseek-v3.2 --bandit-type adversarial --optimize none --max-turns 20 --push-to-db

  # ========== Agent1: openrouter/openai/gpt-4o ==========
  - gpt_qwen:
      layout: tiled
      panes:
        # agent1: openrouter/openai/gpt-4o, agent2: qwen-2.5-72b-instruct
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores  --subset hard --p1-model openrouter/openai/gpt-4o --p2-model openrouter/qwen/qwen-2.5-72b-instruct --bandit-type adversarial --optimize none --max-turns 20 --push-to-db

  - gpt_gpt:
      layout: tiled
      panes:
        # agent1: openrouter/openai/gpt-4o, agent2: openrouter/openai/gpt-4o
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores  --subset hard --p1-model openrouter/openai/gpt-4o --p2-model openrouter/openai/gpt-4o --bandit-type adversarial --optimize none --max-turns 20 --push-to-db

  - gpt_deepseek:
      layout: tiled
      panes:
        # agent1: openrouter/openai/gpt-4o, agent2: deepseek-v3.2
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores  --subset hard --p1-model openrouter/openai/gpt-4o --p2-model openrouter/deepseek/deepseek-v3.2 --bandit-type adversarial --optimize none --max-turns 20 --push-to-db

  # ========== Agent1: deepseek-v3.2 ==========
  - deepseek_qwen:
      layout: tiled

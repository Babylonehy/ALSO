        # agent1: deepseek-v3.2, agent2: qwen-2.5-72b-instruct
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores  --subset hard --p1-model openrouter/deepseek/deepseek-v3.2 --p2-model openrouter/qwen/qwen-2.5-72b-instruct --bandit-type adversarial --optimize none --max-turns 20 --push-to-db

  - deepseek_gpt:
      layout: tiled
      panes:
        # agent1: deepseek-v3.2, agent2: openrouter/openai/gpt-4o
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores  --subset hard --p1-model openrouter/deepseek/deepseek-v3.2 --p2-model openrouter/openai/gpt-4o --bandit-type adversarial --optimize none --max-turns 20 --push-to-db

  - deepseek_deepseek:

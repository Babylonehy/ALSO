# Tmuxinator configuration for neuro_adaptive experiments
# Neural Contextual Bandit + EvoPrompt (Producer-Manager Architecture)
#
# Usage: tmuxinator start -p conf/bandit_neuro_adaptive.yml gpu=0
#        tmuxinator start -p conf/bandit_neuro_adaptive.yml gpu=4 batch=50
#        tmuxinator start -p conf/bandit_neuro_adaptive.yml gpu=0 emd_dir=embeddings_backgrounds_strategic-8b/hard
#        tmuxinator start -p conf/bandit_neuro_adaptive.yml gpu=0 eta=1.0

name: neuro_adaptive-eta<%= (@settings["eta"] || "1.0").to_s.gsub(".", "_") %>-batch<%= (@settings["batch"] || "30").to_s %>-<%= @settings["prefix"] || "" %>
root: ~
startup_window: deepseek-v32

pre_window:
  - cd <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation
  - source <%= @settings["project_root"] || "/path/to/project" %>/.venv/bin/activate
  - unset ALL_PROXY all_proxy
  - export CUDA_VISIBLE_DEVICES=<%= @settings["gpu"] || "0" %>

windows:
  # Window 1: deepseek-v3.2
  - deepseek-v32:
      layout: tiled
      panes:
        # Optimize: p1
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neuro_adaptive --optimize p1 --eta <%= @settings["eta"] || "1.0" %> --max-turns 20 --push-to-db --evolution-interval <%= @settings["evo_interval"] || "10" %>
        # Optimize: p2
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neuro_adaptive --optimize p2 --eta <%= @settings["eta"] || "1.0" %> --max-turns 20 --push-to-db --evolution-interval <%= @settings["evo_interval"] || "10" %>
        # Optimize: both
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neuro_adaptive --optimize both --eta <%= @settings["eta"] || "1.0" %> --max-turns 20 --push-to-db --evolution-interval <%= @settings["evo_interval"] || "10" %>

  # Window 2: gpt-4o-mini (optional, uncomment to use)
  # - gpt4o_mini:
  #     layout: tiled
  #     panes:
  #       # Optimize: p1
  #       - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/openai/gpt-4o-mini --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neuro_adaptive --optimize p1 --eta <%= @settings["eta"] || "1.0" %> --max-turns 20 --push-to-db --evolution-interval <%= @settings["evo_interval"] || "10" %>
  #       # Optimize: p2
  #       - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/openai/gpt-4o-mini --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neuro_adaptive --optimize p2 --eta <%= @settings["eta"] || "1.0" %> --max-turns 20 --push-to-db --evolution-interval <%= @settings["evo_interval"] || "10" %>
  #       # Optimize: both
  #       - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/openai/gpt-4o-mini --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neuro_adaptive --optimize both --eta <%= @settings["eta"] || "1.0" %> --max-turns 20 --push-to-db --evolution-interval <%= @settings["evo_interval"] || "10" %>


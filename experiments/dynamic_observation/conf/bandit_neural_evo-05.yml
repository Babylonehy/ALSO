# Tmuxinator configuration for neural_evolution experiments
# Windows by model, panes by optimize mode (p1/p2/both)
#
# Usage: tmuxinator start -p conf/bandit_neural_evolution.yml gpu=0
#        tmuxinator start -p conf/bandit_neural_evolution.yml gpu=4 batch=50
#        tmuxinator start -p conf/bandit_neural_evolution.yml gpu=0 emd_dir=embeddings_backgrounds_strategic-8b/hard

name: neural_evolution_05-batch<%= (@settings["batch"] || "30").to_s %>-<%= @settings["prefix"] || "" %>
root: ~
startup_window: deepseek-v32

pre_window:
  - cd <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation
  - source <%= @settings["project_root"] || "/path/to/project" %>/.venv/bin/activate
  - unset ALL_PROXY all_proxy
  - export CUDA_VISIBLE_DEVICES=<%= @settings["gpu"] || "0" %>

windows:
  # Window 1: qwen-2.5-72b-instruct
  - deepseek-v32:
      layout: tiled
      panes:
        # Optimize: p1
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neural_evolution --optimize p1 --beta 0.5 --max-turns 30 --push-to-db --evolution-interval 5
        # Optimize: p2
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neural_evolution --optimize p2 --beta 0.5 --max-turns 30 --push-to-db --evolution-interval 5
        # Optimize: both
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neural_evolution --optimize both --beta 0.5 --max-turns 30 --push-to-db --evolution-interval 5
  - qwen25_72b:
      layout: tiled
      panes:
        # Optimize: p1
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/qwen/qwen-2.5-72b-instruct --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neural_evolution --optimize p1 --beta 0.5 --max-turns 30 --push-to-db --evolution-interval 5
        # Optimize: p2
        - uv run python run_bandit_simulation_context.py --embeddings-dir <%= @settings["emd_dir"] || "embeddings_backgrounds_strategic-8b/hard" %> --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/qwen/qwen-2.5-72b-instruct --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neural_evolution --optimize p2 --beta 0.5 --max-turns 30 --push-to-db --evolution-interval 5
        # Optimize: both

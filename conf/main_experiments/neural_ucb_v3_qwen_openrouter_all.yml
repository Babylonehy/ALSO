# Neural UCB Main Experiment - Qwen 2.5-72B (OpenRouter)
#
# Dataset: all (full SOTOPIA)
# Model: openrouter/qwen/qwen-2.5-72b-instruct
# Reward Model: openrouter/qwen/qwen-2.5-72b-instruct
# Beta: 0.05
#
# Usage:
#   tmuxinator start -p conf/main_experiments/neural_ucb_v3_qwen_openrouter_all.yml
#   tmuxinator start -p conf/main_experiments/neural_ucb_v3_qwen_openrouter_all.yml batch=30

name: main-neural-ucb-v3-qwen-openrouter-all-batch<%= (@settings["batch"] || "40").to_s %>
root: .
startup_window: qwen_both

pre_window:
  - cd <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation
  - source <%= @settings["project_root"] || "/path/to/project" %>/.venv/bin/activate
  - unset ALL_PROXY all_proxy

windows:
  # Optimize: both (main experiment)
  - qwen_both:
      layout: tiled
      panes:
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --batch --batch-size <%= @settings["batch"] || "40" %> --no-mask-unselected-scores --subset all --model openrouter/qwen/qwen-2.5-72b-instruct --reward-eval-model openrouter/qwen/qwen-2.5-72b-instruct --bandit-type neural_ucb --optimize both --beta 0.05 --max-turns 20 --push-to-db --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim

  # Optimize: p1 only
  - qwen_p1:
      layout: tiled
      panes:
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --batch --batch-size <%= @settings["batch"] || "40" %> --no-mask-unselected-scores --subset all --model openrouter/qwen/qwen-2.5-72b-instruct --reward-eval-model openrouter/qwen/qwen-2.5-72b-instruct --bandit-type neural_ucb --optimize p1 --beta 0.05 --max-turns 20 --push-to-db --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim

  # Optimize: p2 only
  - qwen_p2:
      layout: tiled
      panes:
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --batch --batch-size <%= @settings["batch"] || "40" %> --no-mask-unselected-scores --subset all --model openrouter/qwen/qwen-2.5-72b-instruct --reward-eval-model openrouter/qwen/qwen-2.5-72b-instruct --bandit-type neural_ucb --optimize p2 --beta 0.05 --max-turns 20 --push-to-db --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim


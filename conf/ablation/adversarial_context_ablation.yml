# Ablation Study: With vs Without Context Embedding for Adversarial Bandit
#
# Context embedding (--context-embedding) uses dialogue history to inform arm selection.
# Without context, the bandit only uses strategy embeddings.
#
# Testing: with context vs without context
#
# Usage:
#   tmuxinator start -p conf/ablation/adversarial_context_ablation.yml gpu=0
#   tmuxinator start -p conf/ablation/adversarial_context_ablation.yml gpu=0 batch=30

name: ablation-adversarial-context-batch<%= (@settings["batch"] || "30").to_s %>
root: .
startup_window: with_context

pre_window:
  - cd <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation
  - source <%= @settings["project_root"] || "/path/to/project" %>/.venv/bin/activate
  - unset ALL_PROXY all_proxy
  - export CUDA_VISIBLE_DEVICES=<%= @settings["gpu"] || "0" %>

windows:
  # WITH Context Embedding (default)
  # Uses: strategy_embedding + context_embedding as NN input
  - with_context:
      layout: tiled
      panes:
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard_small --model "custom/qwen/qwen-2.5-72b-instruct@http://YOUR_MODEL_ENDPOINT/v1" --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type adversarial --optimize both --eta 10.0 --max-turns 20 --push-to-db --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim --tag-suffix ablation_with_context

  # WITHOUT Context Embedding
  # Uses: only strategy_embedding as NN input (no --context-embedding flag)
  - without_context:
      layout: tiled
      panes:
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --subset hard_small --model "custom/qwen/qwen-2.5-72b-instruct@http://YOUR_MODEL_ENDPOINT/v1" --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type adversarial --optimize both --eta 10.0 --max-turns 20 --push-to-db --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim --tag-suffix ablation_without_context


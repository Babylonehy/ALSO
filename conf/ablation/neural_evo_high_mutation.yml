# Ablation Study: Neural Evolution with HIGH Mutation Frequency
# 
# This ablation tests the impact of increasing evolution frequency.
# Evolution interval is set to 2 (instead of default 5), meaning evolution
# happens every 2 turns instead of every 5 turns.
#
# Hypothesis: More frequent evolution may help discover better strategies faster,
# but could also introduce instability.
#
# Comparison:
#   - Default: --evolution-interval 5 (evolve every 5 turns)
#   - This ablation: --evolution-interval 2 (evolve every 2 turns)
#
# Usage:
#   tmuxinator start -p conf/ablation/neural_evo_high_mutation.yml gpu=0
#   tmuxinator start -p conf/ablation/neural_evo_high_mutation.yml project_root=/path/to/project gpu=0

name: ablation-neural-evo-high-mutation-<%= (@settings["batch"] || "40").to_s %>
root: .
startup_window: main

pre_window:
  - cd <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation
  - source <%= @settings["project_root"] || "/path/to/project" %>/.venv/bin/activate
  - unset ALL_PROXY all_proxy
  - export CUDA_VISIBLE_DEVICES=<%= @settings["gpu"] || "0" %>

windows:
  - main:
      layout: tiled
      panes:
        # Optimize: p1 (evolution-interval=2)
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --population-size 13 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --context-embedding --batch --batch-size <%= @settings["batch"] || "40" %> --no-mask-unselected-scores --subset hard --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neural_evolution --optimize p1 --eta <%= @settings["eta"] || "10" %> --max-turns 20 --push-to-db --evolution-interval 2 --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim
        # Optimize: p2 (evolution-interval=2)
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --population-size 13 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --context-embedding --batch --batch-size <%= @settings["batch"] || "40" %> --no-mask-unselected-scores --subset hard --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neural_evolution --optimize p2 --eta <%= @settings["eta"] || "10" %> --max-turns 20 --push-to-db --evolution-interval 2 --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim
        # Optimize: both (evolution-interval=2)
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --population-size 13 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --context-embedding --batch --batch-size <%= @settings["batch"] || "40" %> --no-mask-unselected-scores --subset hard --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neural_evolution --optimize both --eta <%= @settings["eta"] || "10" %> --max-turns 20 --push-to-db --evolution-interval 2 --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim


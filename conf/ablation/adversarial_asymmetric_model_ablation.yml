# Ablation Study: Asymmetric Models for P1 and P2 Agents
#
# Test scenarios where P1 and P2 use different LLM models.
# This simulates real-world cases where agents have different capabilities.
#
# Testing combinations (with adversarial optimization):
#   - P1=DeepSeek, P2=Qwen (custom)
#   - P1=Qwen (custom), P2=DeepSeek
#   - P1=DeepSeek, P2=GPT-4o-mini
#   - P1=GPT-4o-mini, P2=DeepSeek
#
# Baseline (no optimization, bandit-type=none):
#   - Same model combinations without adversarial optimization
#
# Usage:
#   tmuxinator start -p conf/ablation/adversarial_asymmetric_model_ablation.yml gpu=0
#   tmuxinator start -p conf/ablation/adversarial_asymmetric_model_ablation.yml gpu=0 batch=30

name: ablation-adversarial-asymmetric-model-batch<%= (@settings["batch"] || "30").to_s %>
root: .
startup_window: ds_qwen

pre_window:
  - cd <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation
  - source <%= @settings["project_root"] || "/path/to/project" %>/.venv/bin/activate
  - unset ALL_PROXY all_proxy
  - export CUDA_VISIBLE_DEVICES=<%= @settings["gpu"] || "0" %>

windows:
  # ============ BASELINE (no optimization) ============
  # P1=DeepSeek V3.2, P2=Qwen 2.5-72B (custom) - NO optimization
  - baseline_ds_qwen:
      layout: tiled
      panes:
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --subset hard_small --p1-model openrouter/deepseek/deepseek-v3.2 --p2-model "custom/qwen/qwen-2.5-72b-instruct@http://YOUR_MODEL_ENDPOINT/v1" --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type none --max-turns 20 --push-to-db --tag-suffix baseline_p1_ds_p2_qwen

  # P1=Qwen 2.5-72B (custom), P2=DeepSeek V3.2 - NO optimization
  - baseline_qwen_ds:
      layout: tiled
      panes:
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --subset hard_small --p1-model "custom/qwen/qwen-2.5-72b-instruct@http://YOUR_MODEL_ENDPOINT/v1" --p2-model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type none --max-turns 20 --push-to-db --tag-suffix baseline_p1_qwen_p2_ds

  # P1=DeepSeek V3.2, P2=GPT-4o-mini - NO optimization
  - baseline_ds_gpt:
      layout: tiled
      panes:
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --subset hard_small --p1-model openrouter/deepseek/deepseek-v3.2 --p2-model openrouter/openai/gpt-4o-mini --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type none --max-turns 20 --push-to-db --tag-suffix baseline_p1_ds_p2_gpt

  # P1=GPT-4o-mini, P2=DeepSeek V3.2 - NO optimization
  - baseline_gpt_ds:
      layout: tiled
      panes:
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --subset hard_small --p1-model openrouter/openai/gpt-4o-mini --p2-model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type none --max-turns 20 --push-to-db --tag-suffix baseline_p1_gpt_p2_ds

  # ============ ADVERSARIAL OPTIMIZATION ============
  # P1=DeepSeek V3.2, P2=Qwen 2.5-72B (custom)
  # - ds_qwen:
  #     layout: tiled
  #     panes:
  #       - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard_small --p1-model openrouter/deepseek/deepseek-v3.2 --p2-model "custom/qwen/qwen-2.5-72b-instruct@http://YOUR_MODEL_ENDPOINT/v1" --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type adversarial --optimize both --eta 10.0 --max-turns 20 --push-to-db --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim --tag-suffix ablation_p1_ds_p2_qwen

  # # P1=Qwen 2.5-72B (custom), P2=DeepSeek V3.2
  # - qwen_ds:
  #     layout: tiled
  #     panes:
  #       - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard_small --p1-model "custom/qwen/qwen-2.5-72b-instruct@http://YOUR_MODEL_ENDPOINT/v1" --p2-model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type adversarial --optimize both --eta 10.0 --max-turns 20 --push-to-db --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim --tag-suffix ablation_p1_qwen_p2_ds

  # # P1=DeepSeek V3.2, P2=GPT-4o-mini
  # - ds_gpt:
  #     layout: tiled
  #     panes:
  #       - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard_small --p1-model openrouter/deepseek/deepseek-v3.2 --p2-model openrouter/openai/gpt-4o-mini --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type adversarial --optimize both --eta 10.0 --max-turns 20 --push-to-db --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim --tag-suffix ablation_p1_ds_p2_gpt

  # # P1=GPT-4o-mini, P2=DeepSeek V3.2
  # - gpt_ds:
  #     layout: tiled
  #     panes:
  #       - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard_small --p1-model openrouter/openai/gpt-4o-mini --p2-model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type adversarial --optimize both --eta 10.0 --max-turns 20 --push-to-db --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim --tag-suffix ablation_p1_gpt_p2_ds


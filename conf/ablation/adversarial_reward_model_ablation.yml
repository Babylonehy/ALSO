# Ablation Study: Different Turn Reward Models for Adversarial Bandit
#
# Turn reward model (--reward-eval-model) evaluates each turn's reward.
# Different models may have different evaluation quality and cost.
#
# Testing: deepseek-v3.2, gpt-4o-mini, qwen-2.5-72b-instruct
#
# Usage:
#   tmuxinator start -p conf/ablation/adversarial_reward_model_ablation.yml gpu=0
#   tmuxinator start -p conf/ablation/adversarial_reward_model_ablation.yml gpu=0 batch=30

name: ablation-adversarial-reward-model-batch<%= (@settings["batch"] || "30").to_s %>
root: .
startup_window: deepseek

pre_window:
  - cd <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation
  - source <%= @settings["project_root"] || "/path/to/project" %>/.venv/bin/activate
  - unset ALL_PROXY all_proxy
  - export CUDA_VISIBLE_DEVICES=<%= @settings["gpu"] || "0" %>

windows:
  # Reward Model: DeepSeek V3.2 (default, high quality, low cost)
  - deepseek:
      layout: tiled
      panes:
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard_small --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type adversarial --optimize both --eta 10.0 --max-turns 20 --push-to-db --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim --tag-suffix ablation_reward_deepseek

  # Reward Model: GPT-4o-mini (fast, lower cost)
  - gpt4o_mini:
      layout: tiled
      panes:
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard_small --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/openai/gpt-4o-mini --bandit-type adversarial --optimize both --eta 10.0 --max-turns 20 --push-to-db --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim --tag-suffix ablation_reward_gpt4o_mini

  # Reward Model: Qwen 2.5-72B (custom, alternative high quality)
  - qwen:
      layout: tiled
      panes:
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard_small --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model "custom/qwen/qwen-2.5-72b-instruct@http://YOUR_MODEL_ENDPOINT/v1" --bandit-type adversarial --optimize both --eta 10.0 --max-turns 20 --push-to-db --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim --tag-suffix ablation_reward_qwen

  # Reward Model: Claude 3.5 Sonnet (high quality, higher cost)
  # - claude:
  #     layout: tiled
  #     panes:
  #       - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "30" %> --no-mask-unselected-scores --context-embedding --subset hard_small --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/anthropic/claude-3.5-sonnet --bandit-type adversarial --optimize both --eta 10.0 --max-turns 20 --push-to-db --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim --tag-suffix ablation_reward_claude


# Ablation Study: Neural Evolution WITHOUT Evolution (Static Strategy Set)
# 
# This ablation tests the impact of the evolution mechanism by effectively disabling it.
# Setting evolution-interval to 9999 means evolution will never trigger during the episode.
# This makes it equivalent to a standard Neural UCB with fixed strategy set.
#
# Comparison:
#   - Full model: --evolution-interval 5 (evolve every 5 turns)
#   - This ablation: --evolution-interval 9999 (never evolve, static strategies)
#
# Usage:
#   tmuxinator start -p conf/ablation/neural_evo_no_evolution.yml gpu=0
#   tmuxinator start -p conf/ablation/neural_evo_no_evolution.yml project_root=/path/to/project gpu=0

name: ablation-neural-evo-no-evolution-<%= (@settings["batch"] || "40").to_s %>
root: .
startup_window: main

pre_window:
  - cd <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation
  - source <%= @settings["project_root"] || "/path/to/project" %>/.venv/bin/activate
  - unset ALL_PROXY all_proxyssh USER@YOUR_SERVER -p PORT
  - export CUDA_VISIBLE_DEVICES=<%= @settings["gpu"] || "0" %>

windows:
  - main:
      layout: tiled
      panes:
        # Optimize: p1 (NO evolution - interval=9999)
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --population-size 13 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "40" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neural_evolution --optimize p1 --eta <%= @settings["eta"] || "10" %> --max-turns 20 --push-to-db --evolution-interval 9999 --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim
        # Optimize: p2 (NO evolution - interval=9999)
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --population-size 13 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "40" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neural_evolution --optimize p2 --eta <%= @settings["eta"] || "10" %> --max-turns 20 --push-to-db --evolution-interval 9999 --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim
        # Optimize: both (NO evolution - interval=9999)
        - uv run python run_bandit_simulation_context.py --selection-mode strategy --strategy-version v3 --population-size 13 --embedding-model qwen/qwen3-embedding-8b --context-embedding-dim 4096 --batch --batch-size <%= @settings["batch"] || "40" %> --no-mask-unselected-scores --context-embedding --subset hard --model openrouter/deepseek/deepseek-v3.2 --reward-eval-model openrouter/deepseek/deepseek-v3.2 --bandit-type neural_evolution --optimize both --eta <%= @settings["eta"] || "10" %> --max-turns 20 --push-to-db --evolution-interval 9999 --strategy-cache-dir <%= @settings["project_root"] || "/path/to/project" %>/experiments/dynamic_observation/cache/strategy_embeddings_v3_slim

